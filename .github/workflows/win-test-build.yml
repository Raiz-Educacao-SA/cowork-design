# JUSTIFICATIVA-GHA: W2 — validação do runtime headless do Open Design no Windows (binário multi-plataforma)
# ALTERNATIVA-DESCARTADA: build/teste local no Mac inviável (Node 24 + Windows runtime exigem runner windows)
name: win-test-build

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  headless-smoke:
    name: Windows headless smoke (no Electron, no NSIS)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app dir (no NSIS, avoids makensis)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pnpm exec tools-pack win build `
            --dir "$env:RUNNER_TEMP/tools-pack" `
            --namespace win-test `
            --portable `
            --app-version "0.6.0-test" `
            --to dir `
            --json | Tee-Object -FilePath "$env:RUNNER_TEMP/win-build.json"

      - name: Locate headless artifacts (node.exe + headless.mjs)
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "$env:RUNNER_TEMP/tools-pack"
          $node = Get-ChildItem -Path $root -Recurse -Filter "node.exe" -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match "[\\/]bin[\\/]node\.exe$" } | Select-Object -First 1
          $headless = Get-ChildItem -Path $root -Recurse -Filter "headless.mjs" -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match "@open-design[\\/]packaged[\\/]dist[\\/]headless\.mjs$" } | Select-Object -First 1
          Write-Host "node.exe     => $($node.FullName)"
          Write-Host "headless.mjs => $($headless.FullName)"
          if (-not $node)     { throw "bin/node.exe NOT found in build output" }
          if (-not $headless) { throw "@open-design/packaged/dist/headless.mjs NOT found in build output" }
          $resourceRoot = Split-Path (Split-Path $node.FullName -Parent) -Parent
          Write-Host "OD_RESOURCE_ROOT => $resourceRoot"
          "node=$($node.FullName)"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "headless=$($headless.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resource_root=$resourceRoot"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run headless and verify Open Design serves a URL
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $node = "${{ steps.locate.outputs.node }}"
          $headless = "${{ steps.locate.outputs.headless }}"
          $resourceRoot = "${{ steps.locate.outputs.resource_root }}"
          $dataDir = Join-Path $env:RUNNER_TEMP "od-data"
          New-Item -ItemType Directory -Force -Path $dataDir | Out-Null
          $log = Join-Path $env:RUNNER_TEMP "headless.log"
          "" | Set-Content $log

          $env:OD_NAMESPACE = "win-test"
          $env:OD_DATA_DIR = $dataDir
          $env:OD_RESOURCE_ROOT = $resourceRoot

          Write-Host "Spawning headless: $node $headless"
          $proc = Start-Process -FilePath $node -ArgumentList @($headless) `
            -WorkingDirectory (Split-Path $headless -Parent) `
            -RedirectStandardOutput $log -RedirectStandardError "$log.err" `
            -PassThru -NoNewWindow

          $url = $null
          $deadline = (Get-Date).AddSeconds(150)
          while ((Get-Date) -lt $deadline -and -not $url) {
            Start-Sleep -Seconds 3
            $content = (Get-Content $log -Raw -ErrorAction SilentlyContinue) + (Get-Content "$log.err" -Raw -ErrorAction SilentlyContinue)
            $m = [regex]::Match($content, "http://(127\.0\.0\.1|localhost):\d+")
            if ($m.Success) { $url = $m.Value }
            if ($proc.HasExited) { break }
          }

          Write-Host "===== headless stdout ====="; Get-Content $log -ErrorAction SilentlyContinue
          Write-Host "===== headless stderr ====="; Get-Content "$log.err" -ErrorAction SilentlyContinue

          if (-not $url) {
            if (-not $proc.HasExited) { $proc.Kill() }
            throw "headless did not report a web URL within 150s"
          }
          Write-Host "Detected web URL => $url"

          $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30
          Write-Host "HTTP status => $($resp.StatusCode)"
          if (-not $proc.HasExited) { $proc.Kill() }
          if ($resp.StatusCode -ge 400) { throw "Open Design web returned HTTP $($resp.StatusCode)" }
          Write-Host "OK: Open Design headless serves HTTP on Windows"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-smoke-logs
          path: |
            ${{ runner.temp }}/headless.log
            ${{ runner.temp }}/headless.log.err
            ${{ runner.temp }}/win-build.json
          if-no-files-found: warn
