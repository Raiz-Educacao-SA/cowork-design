# JUSTIFICATIVA-GHA: W2 — validação do runtime headless do Open Design no Windows (binário multi-plataforma)
# ALTERNATIVA-DESCARTADA: build/teste local no Mac inviável (Node 24 + Windows runtime exigem runner windows)
name: win-test-build

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  headless-smoke:
    name: Windows headless smoke (no Electron, no NSIS)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reduce AV interference (electron.exe rename ENOENT)
        shell: pwsh
        continue-on-error: true
        run: |
          # electron-builder's rename electron.exe -> product .exe intermittently hits ENOENT
          # because Windows Defender briefly locks the freshly-extracted electron.exe. Exclude
          # the build dirs + the electron process from realtime scanning.
          try { Add-MpPreference -ExclusionPath "$env:RUNNER_TEMP" -ErrorAction Stop } catch { Write-Warning "exclusion RUNNER_TEMP: $_" }
          try { Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron" -ErrorAction Stop } catch { Write-Warning $_ }
          try { Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder" -ErrorAction Stop } catch { Write-Warning $_ }
          try { Add-MpPreference -ExclusionProcess "electron.exe" -ErrorAction Stop } catch { Write-Warning $_ }
          Write-Host "Defender exclusions applied (best-effort)"

      - name: Build Windows app dir (no NSIS, avoids makensis)
        shell: pwsh
        run: |
          # electron-builder on Windows intermittently fails renaming electron.exe -> product .exe
          # (Defender / file lock). Retry up to 3x, clearing the partial builder cache between tries.
          $ErrorActionPreference = "Continue"
          $ok = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "===== tools-pack win build (attempt $i/3) ====="
            pnpm exec tools-pack win build `
              --dir "$env:RUNNER_TEMP/tools-pack" `
              --namespace win-test `
              --portable `
              --app-version "0.6.0-test" `
              --to dir `
              --json | Tee-Object -FilePath "$env:RUNNER_TEMP/win-build.json"
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            Write-Warning "build attempt $i failed (exit $LASTEXITCODE); clearing electron-builder cache + retrying"
            Remove-Item -Recurse -Force "$env:RUNNER_TEMP/tools-pack/cache/entries/win.electron-builder-dir" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 8
          }
          if (-not $ok) { throw "tools-pack win build failed after 3 attempts" }

      - name: tools-pack win install --headless
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pnpm exec tools-pack win install --headless `
            --dir "$env:RUNNER_TEMP/tools-pack" `
            --namespace win-test `
            --portable `
            --app-version "0.6.0-test" `
            --json | Tee-Object -FilePath "$env:RUNNER_TEMP/install.json"

      - name: tools-pack win start --headless and verify HTTP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $raw = pnpm exec tools-pack win start --headless `
            --dir "$env:RUNNER_TEMP/tools-pack" `
            --namespace win-test `
            --portable `
            --app-version "0.6.0-test" `
            --json
          $exit = $LASTEXITCODE
          $raw | Out-File -FilePath "$env:RUNNER_TEMP/start.json" -Encoding utf8
          Write-Host "===== start --headless raw output ====="
          $raw
          if ($exit -ne 0) {
            Write-Host "===== sidecar logs (recursive *.log under tools-pack) ====="
            Get-ChildItem -Path "$env:RUNNER_TEMP/tools-pack" -Recurse -Include *.log -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "----- $($_.FullName) -----"
              Get-Content $_.FullName -ErrorAction SilentlyContinue | Select-Object -Last 80
            }
            Write-Host "===== ALL files under tools-pack/runtime (tree) ====="
            Get-ChildItem -Path "$env:RUNNER_TEMP/tools-pack/runtime" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName,Length | Format-Table -AutoSize | Out-String -Width 260
            Write-Host "===== identity files (*-root.json) recursive under tools-pack ====="
            Get-ChildItem -Path "$env:RUNNER_TEMP/tools-pack" -Recurse -Filter "*-root.json" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "----- $($_.FullName) -----"
              Get-Content $_.FullName -ErrorAction SilentlyContinue
            }
            throw "tools-pack win start --headless failed (exit $exit)"
          }
          $result = $raw | ConvertFrom-Json
          $url = $result.status.url
          Write-Host "Detected web URL => $url"
          if (-not $url) { throw "no url in start --headless result" }
          $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30
          Write-Host "HTTP status => $($resp.StatusCode)"
          if ($resp.StatusCode -ge 400) { throw "Open Design web returned HTTP $($resp.StatusCode)" }
          Write-Host "OK: tools-pack win --headless serves HTTP on Windows"

      - name: tools-pack win stop --headless
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          pnpm exec tools-pack win stop --headless `
            --dir "$env:RUNNER_TEMP/tools-pack" `
            --namespace win-test `
            --portable `
            --app-version "0.6.0-test" `
            --json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-smoke-logs
          path: |
            ${{ runner.temp }}/win-build.json
            ${{ runner.temp }}/install.json
            ${{ runner.temp }}/start.json
            ${{ runner.temp }}/tools-pack/runtime/win/namespaces/win-test/logs/**/*.log
          if-no-files-found: warn
